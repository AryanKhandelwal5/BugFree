name: codepilot-ai

services:
  api:
    build: ./services/api
    env_file: .env
    ports: ["8000:8000"]
    depends_on:
      postgres: { condition: service_healthy }
      redis: { condition: service_healthy }
      qdrant: { condition: service_healthy }
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/api/v1/health/live')"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 20s
  web:
    build: ./apps/web
    environment:
      NEXT_PUBLIC_API_BASE_URL: http://localhost:8000
    ports: ["3000:3000"]
    depends_on:
      api: { condition: service_healthy }
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:3000/" ]
      interval: 15s
      timeout: 5s
      retries: 5
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: codepilot
      POSTGRES_USER: codepilot
      POSTGRES_PASSWORD: codepilot
    volumes: [postgres-data:/var/lib/postgresql/data]
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U codepilot -d codepilot"]
      interval: 10s
      timeout: 5s
      retries: 5
  redis:
    image: redis:7-alpine
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
  qdrant:
    image: qdrant/qdrant:v1.12.5
    volumes: [qdrant-data:/qdrant/storage]
    healthcheck:
      test: ["CMD-SHELL", "wget -q --spider http://localhost:6333/healthz"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  postgres-data:
  qdrant-data:

